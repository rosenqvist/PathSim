name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.compiler }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libgl-dev libxinerama-dev libxcursor-dev libxi-dev libxrandr-dev

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '4b77da7fed37817f124936239197833469f1b9a8'

      - name: Configure (Debug)
        run: |
          cmake -B build/debug -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake

      - name: Build (Debug)
        run: cmake --build build/debug

      - name: Test
        run: ctest --test-dir build/debug --output-on-failure

      - name: clang-tidy
        if: matrix.compiler == 'clang'
        run: |
          sudo apt-get install -y clang-tidy
          run-clang-tidy -p build/debug "src/.*\.(cpp|hpp)"

      - name: Configure (Release)
        run: |
          cmake -B build/release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake

      - name: Build (Release)
        run: cmake --build build/release

  format-check:
    runs-on: ubuntu-latest
    name: clang-format

    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: |
          find src tests -name '*.cpp' -o -name '*.hpp' | xargs clang-format --dry-run --Werror

  build-web:
    runs-on: ubuntu-latest
    name: emscripten
    permissions:
    contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.56

      - name: Configure
        run: |
          emcmake cmake -B build/web \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/web

      - name: Prepare deploy
        run: |
          mkdir -p deploy
          cp build/web/web/PathSim.html deploy/index.html
          cp build/web/web/PathSim.js deploy/
          cp build/web/web/PathSim.wasm deploy/

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master' && contains(github.event.head_commit.message, '[deploy]')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy